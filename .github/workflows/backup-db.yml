name: Backup do banco (criptografado)

# Backup automático do PostgreSQL (Supabase) — compensa a ausência de backup
# nativo no plano grátis. O dump é SEMPRE criptografado (GPG/AES-256) antes de
# sair do runner, então é seguro guardá-lo como artifact mesmo em repo público.
# Detalhes e procedimento de restauração: docs/06-QUALIDADE-FASE8.md.

on:
  schedule:
    # Domingos, 03:00 UTC (00:00 em Brasília). Cron só dispara na branch padrão.
    - cron: "0 3 * * 0"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: db-backup
  cancel-in-progress: false

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Gerar dump (pg_dump via Postgres 17)
        env:
          # Use a connection string do *Session pooler* (IPv4, porta 5432).
          DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          set -euo pipefail
          if [ -z "${DB_URL}" ]; then
            echo "::error::Secret SUPABASE_DB_URL ausente. Veja docs/06-QUALIDADE-FASE8.md."
            exit 1
          fi
          mkdir -p out
          stamp="$(date -u +%Y%m%dT%H%M%SZ)"
          echo "stamp=${stamp}" >> "${GITHUB_ENV}"
          # A connection string fica só no env do container (nunca no argv/logs).
          docker run --rm -e DB_URL postgres:17-alpine \
            sh -c 'pg_dump --no-owner --no-privileges --format=plain "$DB_URL"' \
            | gzip -9 > "out/gaveta-${stamp}.sql.gz"
          ls -lh out

      - name: Criptografar (GPG simétrico, AES-256)
        env:
          PASSPHRASE: ${{ secrets.BACKUP_PASSPHRASE }}
        run: |
          set -euo pipefail
          if [ -z "${PASSPHRASE}" ]; then
            echo "::error::Secret BACKUP_PASSPHRASE ausente. Veja docs/06-QUALIDADE-FASE8.md."
            exit 1
          fi
          gpg --batch --yes --pinentry-mode loopback \
            --passphrase "${PASSPHRASE}" \
            --cipher-algo AES256 --symmetric \
            --output "out/gaveta-${stamp}.sql.gz.gpg" \
            "out/gaveta-${stamp}.sql.gz"
          # Remove a versão em claro: só o arquivo criptografado é publicado.
          rm -f "out/gaveta-${stamp}.sql.gz"
          ls -lh out

      - name: Publicar artifact criptografado
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ env.stamp }}
          path: out/*.gpg
          retention-days: 90
          if-no-files-found: error
